version: '3.8'

services:
  backend:
    build: ./backend
    container_name: cert-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3001

  frontend:
    build: ./frontend
    container_name: cert-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  db-data:
